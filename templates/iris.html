<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IrisDataset Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.0/css/all.min.css">
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(to right, #1e3c72, #2a5298);
            color: white;
            min-height: 100vh;
        }

        header {
            text-align: center;
            padding: 40px 20px;
        }

        header h1 {
            font-size: 3rem;
            margin-bottom: 10px;
        }

        /* Button Styling */
        .nav-buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
        }

        .btn {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 12px 24px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.4);
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .btn i {
            font-size: 1.1rem;
        }

        .container {
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        table {
            background: rgba(255, 255, 255, 0.1);
            border-collapse: collapse;
            width: 90%;
            max-width: 1000px;
            backdrop-filter: blur(10px);
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
        }

        th, td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        th {
            background-color: rgba(255, 255, 255, 0.2);
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 1px;
        }

        footer {
            text-align: center;
            padding: 40px 20px;
            font-size: 0.9rem;
            opacity: 0.8;
        }
    </style>
</head>

<body>

    <header>
        <h1><i class="fa-solid fa-seedling"></i> Iris Dataset</h1>
    </header>

    <div class="nav-buttons">
        <a href="/" class="btn"><i class="fa-solid fa-house"></i> Home</a>
        <a href="/iris_data" class="btn"><i class="fa-solid fa-table"></i> View Table</a>
        <a href="/iris_bar" class="btn"><i class="fa-solid fa-chart-bar"></i> Bar Chart</a>
        <a href="/iris_pie" class="btn"><i class="fa-solid fa-chart-pie"></i> Pie Chart</a>
    </div>

    </div>

    <footer>
        <p>© 2026 Iris Dataset Dashboard | Built with Flask</p>
    </footer>

</body>
</html>

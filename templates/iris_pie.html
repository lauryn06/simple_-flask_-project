<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IrisDataset Dashboard</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.0/css/all.min.css">
    <style>
        body {
            margin: 0;
         font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(to right, #1e3c72, #2a5298);
            color: white;
        }

        header {
            text-align: center;
            padding: 60px 20px;
        }

        header h1 {
            font-size: 3rem;
            margin-bottom: 10px;
        }

        header p {
            font-size: 1.2rem;
            opacity: 0.9;
        }

        .container {
            display: flex;
            justify-content: center;
            gap: 30px;
            padding: 40px;
            flex-wrap: wrap;
        }
table {
    background: rgba(255, 255, 255, 0.1);
    border-collapse: collapse;
    width: 80%;
    margin: auto;
    backdrop-filter: blur(10px);
    border-radius: 10px;
    overflow: hidden;
}

th, td {
    padding: 15px;
    text-align: left;
    border-bottom: 1px solid rgba(255, 255, 255, 0.2);
}

th {
    background-color: rgba(255, 255, 255, 0.2);
    text-transform: uppercase;
    font-size: 0.8rem;
    letter-spacing: 1px;
}
        footer {
            text-align: center;
            padding: 20px;
            font-size: 0.9rem;
            opacity: 0.8;
        }
    </style>
</head>

<body>

    <header>
        <h1> <i class="fa-solid fa-seedling"></i>Iris Pie Chart</h1>
    </header>

    <div class="container">
        {% if plot_url %}
            <img src="data:image/png;base64,{{ plot_url }}" alt="Iris Pie Chart" style="max-width: 100%; border-radius: 15px; box-shadow: 0 8px 32px rgba(0,0,0,0.2);">
        {% else %}
            <p>Pie chart could not be generated.</p>
        {% endif %}

    </div>

    <footer>
        <p>© 2026 Iris Dataset Dashboard | Built with Flask</p>
    </footer>

</body>
</html>
